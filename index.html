<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <h1><i class="fa-solid fa-cloud-sun"></i> Weather App</h1>

    <div class="search-box">

        <input
            type="text"
            id="city"
            placeholder="Enter City Name">

        <button onclick="getWeather()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>

    </div>

    <button class="location-btn" onclick="getLocation()">
        📍 Current Location
    </button>

    <div class="loader" id="loader"></div>

    <div class="weather-card" id="weather">

        <h2 id="cityName"></h2>

        <img id="icon">

        <h1 id="temp"></h1>

        <h3 id="description"></h3>

        <div class="details">

            <div class="box">
                💧
                <p>Humidity</p>
                <span id="humidity"></span>
            </div>

            <div class="box">
                💨
                <p>Wind</p>
                <span id="wind"></span>
            </div>

            <div class="box">
                🌡️
                <p>Feels Like</p>
                <span id="feels"></span>
            </div>

            <div class="box">
                📈
                <p>Pressure</p>
                <span id="pressure"></span>
            </div>

            <div class="box">
                🔺
                <p>Max Temp</p>
                <span id="max"></span>
            </div>

            <div class="box">
                🔻
                <p>Min Temp</p>
                <span id="min"></span>
            </div>

        </div>

    </div>

    <p id="error"></p>

</div>

<script src="script.js"></script>

</body>
</html>
